<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home - Data Mahasiswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000080; /* Warna dasar Navy */
            color: white; /* Mengubah teks dasar menjadi putih */
        }
        /* Penyesuaian warna tabel agar serasi dengan navy */
        .table-custom th { background-color: #1e3a8a; color: white; border: none; }
        .text-link { color: #60a5fa; } /* Biru muda untuk link agar kontras */
        .text-link:hover { color: #93c5fd; }
    </style>
</head>
<body>
<div class="container mt-5">
    <h5 class="fw-bold mb-3">MY Website <span th:text="${nimNim}"></span> - Nabil Nasruddin</h5>
    <p class="fs-6 mb-2">Selamat datang di aplikasi!</p>

    <a th:href="@{/form}" class="text-decoration-none text-link">+ Input Data Mahasiswa</a>

    <h6 class="fw-bold mt-5 mb-2">Data Mahasiswa</h6>

    <table class="table table-bordered bg-white text-dark shadow-sm">
        <thead class="table-custom text-center">
        <tr>
            <th class="py-2">No</th>
            <th class="py-2">Nama</th>
            <th class="py-2">NIM</th>
            <th class="py-2">Jenis Kelamin</th>
        </tr>
        </thead>
        <tbody class="text-center align-middle">
        <tr th:if="${#lists.isEmpty(users)}">
            <td colspan="4" class="text-muted py-3">Belum ada data</td>
        </tr>
        <tr th:each="u, iterStat : ${users}">
            <td th:text="${iterStat.count}">1</td>
            <td th:text="${u.nama}">Nama</td>
            <td th:text="${u.nim}">NIM</td>
            <td th:text="${u.jenisKelamin}">Jenis Kelamin</td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/logout}" class="text-decoration-none mt-4 d-inline-block text-link">Logout</a>
</div>
</body>
</html>
