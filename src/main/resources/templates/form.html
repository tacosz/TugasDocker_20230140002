<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Input Mahasiswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000080; color: white; }
        .text-link { color: #60a5fa; }
        .text-link:hover { color: #93c5fd; }
        .form-check-input { border-color: #6c757d; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 text-center">
<div class="container" style="max-width: 500px;">
    <h5 class="fw-bold mb-4">Form Input Mahasiswa</h5>

    <div class="card shadow-sm mb-3 text-dark">
        <div class="card-body p-4">
            <form th:action="@{/form}" th:object="${user}" method="post">
                <div class="mb-3">
                    <label class="form-label text-muted small">Nama:</label>
                    <input type="text" th:field="*{nama}" class="form-control rounded-0 text-center" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small">NIM:</label>
                    <input type="text" th:field="*{nim}" class="form-control rounded-0 text-center" required>
                </div>

                <div class="mb-4 mt-4">
                    <label class="form-label text-muted small d-block mb-3">Jenis Kelamin:</label>

                    <div class="d-flex justify-content-center gap-4">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" th:field="*{jenisKelamin}" value="Laki-laki" id="laki" required>
                            <label class="form-check-label" for="laki">Laki-laki</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" th:field="*{jenisKelamin}" value="Perempuan" id="perempuan" required>
                            <label class="form-check-label" for="perempuan">Perempuan</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary rounded-1 px-5 py-2 mt-2">Submit</button>
            </form>
        </div>
    </div>

    <a th:href="@{/home}" class="text-decoration-none text-link">Kembali ke Home</a>
</div>
</body>
</html>
