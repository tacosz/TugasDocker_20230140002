<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000080; color: white; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 text-center">
<div class="container" style="max-width: 450px;">
    <h4 class="fw-bold mb-4">Login Page</h4>

    <div class="card shadow-sm text-dark">
        <div class="card-body p-4">
            <form th:action="@{/login}" method="post">
                <div th:if="${error}" class="alert alert-danger p-2" th:text="${error}"></div>

                <div class="mb-3">
                    <label class="form-label text-muted small">Username:</label>
                    <input type="text" name="username" class="form-control rounded-0 text-center" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small">Password:</label>
                    <input type="password" name="password" class="form-control rounded-0 text-center" required>
                </div>
                <button type="submit" class="btn btn-primary rounded-1 px-5 py-2">Login</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
